<div>
    <form action="{{ url_for('create_user') }}" method="post">
    
        <div>
            <h1>Crie sua conta</h1>
        </div>
        <div>
            <label for="name">Nome: </label></br>
            <input type="text" name="name" id="name"></br>

            <label for="last_name">Sobrenome: </label></br>
            <input type="text" name="last_name" id="last_name"></br>

            <label for="email">E-mail: </label></br>
            <input type="text" name="email" id="email"></br>

            <label for="phone">Telefone: </label></br>
            <input type="text" name="phone" id="phone"></br>

            <label for="zip-code">CEP: </label></br>
            <input type="text" name="zip-code" id="zip-code"></br>

            <label for="state">Estado: </label></br>
            <input type="int" name="state" id="state"></br>

            <label for="city">Cidade: </label></br>
            <input type="int" name="city" id="city"></br>

            <label for="password">Senha: </label></br>
            <input type="password" name="password" id="password"></br>

            <label for="password_c">Confirme sua senha: </label></br>
            <input type="password" name="password_c" id="password_c"></br>

        </div>
        <div>
            <button>Registrar</button>
        </div>
    
    </form>
</div>
