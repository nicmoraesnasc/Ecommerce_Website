<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
    <title>Update {{ product_name }}</title>
</head>
<body>
    <div>
        {% include 'header/index.html' %}
    
        <h1>{{ product_id }}</h1>
        <form action="{{ url_for('update_product', id=product_id) }}" method="POST">
            <td><label for="product_img">Imagem: </label></td>
            <td><input type="text" name="product_name" id="product_name" value="{{ product_name }}"></td>
            <td><input type="text" name="product_price" id="product_price" value="{{ product_price }}"></td>
            <td><input type="text" name="product_desc" id="product_desc" value="{{ product_desc }}"></td>
            <button>Atualizar produto</button>
        </form>
        <form action="{{ url_for('delete_product', id=product_id) }}" method="POST">
            <button>Excluir</button>
        </form>
    </div>
</body>
</html>
